name: Daily Prospect Discovery

on:
  workflow_dispatch:
  schedule:
    - cron: "17 13 * * *"

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          python scripts/run_daily_pipeline.py

      - name: Commit refreshed prospect files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          touch output/fresh-prospects.csv output/discovered-prospects.csv output/discovery-summary.md output/fresh-outreach.csv
          git add data/prospect_index.csv
          git add -f output/fresh-prospects.csv output/discovered-prospects.csv output/discovery-summary.md output/fresh-outreach.csv
          git diff --cached --quiet || git commit -m "chore: refresh daily prospect discovery"
          git push
